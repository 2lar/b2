
services:
  # Brain2 Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - TAGGER_TYPE=local_llm
      - TAGGER_SERVICE_URL=http://tagger-service:8000
      - TAGGER_FALLBACK=true
      - TAGGER_MAX_TAGS=5
      - AWS_REGION=us-east-1
      - TABLE_NAME=brain2-dev
      - KEYWORD_INDEX_NAME=KeywordIndex
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    ports:
      - "3000:3000"
    depends_on:
      - tagger-service
      - dynamodb-local
    networks:
      - brain2-network

  # LLM Tagger Service
  tagger-service:
    build:
      context: ./tagger-service
      dockerfile: Dockerfile
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      # Mount models directory for persistent model caching
      - ./tagger-service/models:/app/models
      - ./tagger-service/tags.json:/app/tags.json
    networks:
      - brain2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Allow time for model loading

  # Frontend (for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - brain2-network

  # Local DynamoDB for development
  dynamodb-local:
    container_name: b2-dynamodb-local
    image: amazon/dynamodb-local:latest
    ports:
      - "8002:8000"
    networks:
      - brain2-network
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

networks:
  brain2-network:
    driver: bridge

volumes:
  models-cache:
    driver: local