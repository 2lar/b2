# Development docker-compose for just the tagger service
# Useful when developing the Go backend locally but want to test with the LLM service
version: '3.8'

services:
  # LLM Tagger Service only
  tagger-service:
    build:
      context: ./tagger-service
      dockerfile: Dockerfile
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      # Mount models directory for persistent model caching
      - ./tagger-service/models:/app/models
      - ./tagger-service/tags.json:/app/tags.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Allow time for model loading

# Usage:
# docker-compose -f docker-compose.dev.yml up tagger-service
# Then run Go backend locally with:
# TAGGER_TYPE=local_llm TAGGER_SERVICE_URL=http://localhost:8000 go run ./cmd/main