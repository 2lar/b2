name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Build Go Lambdas
      working-directory: ./backend
      run: ./build.sh
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install CDK dependencies
      working-directory: ./infra
      run: npm ci
    
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Deploy with CDK
      working-directory: ./infra
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        npm run build
        npx cdk deploy --require-approval never --outputs-file outputs.json

    - name: Extract and Display Outputs
      id: extract_outputs
      working-directory: ./infra
      run: |
        API_URL=$(jq -r '.b2Stack.ApiUrl' outputs.json)
        CLOUDFRONT_URL=$(jq -r '.b2Stack.CloudFrontUrl' outputs.json)
        WEBSOCKET_URL=$(jq -r '.b2Stack.WebSocketUrl' outputs.json)
        echo "API_URL=$API_URL" >> $GITHUB_ENV
        echo "CLOUDFRONT_URL=$CLOUDFRONT_URL" >> $GITHUB_ENV
        echo "WEBSOCKET_URL=$WEBSOCKET_URL" >> $GITHUB_ENV
        echo "::set-output name=api_url::$API_URL"
        echo "::set-output name=cloudfront_url::$CLOUDFRONT_URL"
        echo "::set-output name=websocket_url::$WEBSOCKET_URL"
        
    - name: Display deployment info
      run: |
        echo "🚀 Backend deployed successfully!"
        echo "API URL: ${{ env.API_URL }}"
        echo "CloudFront URL: ${{ env.CLOUDFRONT_URL }}"
        echo "WebSocket URL: ${{ env.WEBSOCKET_URL }}"